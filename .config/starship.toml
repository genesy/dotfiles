# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true

format = '''$custom$username$hostname:$directory$git_branch$git_commit$git_state$git_metrics$git_status
$character'''

[custom.ssh]
command = 'echo "SSH"'
when = '[ -n "$SSH_CONNECTION" ]'
style = "bold bright-red"
format = "[$output ]($style)"

[username]
style_user = 'green '
style_root = 'black bold'
format = '[$user]($style)'
disabled = false
show_always = true
# aliases = { "corpuser034g" = "matchai" }

[hostname]
ssh_only = false
ssh_symbol = '⚡'
format = '[@](green)[$ssh_symbol$hostname](green)'
trim_at = '.'
disabled = false

[directory]
truncation_length= 4

[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style)'

